<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUNON</title>
<style>
@font-face {
    font-family: 'Kohinoor Bangla';
    src: local('Kohinoor Bangla Regular'), local('KohinoorBangla-Regular'),
         url('fonts/KohinoorBangla-Regular.eot');
    src: local('Kohinoor Bangla Regular'), local('KohinoorBangla-Regular'),
         url('fonts/KohinoorBangla-Regular.eot?#iefix') format('embedded-opentype'),
         url('fonts/KohinoorBangla-Regular.woff2') format('woff2'),
         url('fonts/KohinoorBangla-Regular.woff') format('woff'),
         url('fonts/KohinoorBangla-Regular.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
}
@font-face {
    font-family: 'Kohinoor Bangla';
    src: local('Kohinoor Bangla Bold'), local('KohinoorBangla-Bold'),
         url('fonts/KohinoorBangla-Bold.eot');
    src: local('Kohinoor Bangla Bold'), local('KohinoorBangla-Bold'),
         url('fonts/KohinoorBangla-Bold.eot?#iefix') format('embedded-opentype'),
         url('fonts/KohinoorBangla-Bold.woff2') format('woff2'),
         url('fonts/KohinoorBangla-Bold.woff') format('woff'),
         url('fonts/KohinoorBangla-Bold.ttf') format('truetype');
    font-weight: bold;
    font-style: normal;
    font-display: swap;
}

:root {
    --bg: #0f1117;
    --surface: #1a1b26;
    --border: #2a2b3d;
    --text: #e0e0e0;
    --text-dim: #8888a0;
    --accent: #7c3aed;
    --accent-hover: #6d28d9;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Kohinoor Bangla', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

.toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
}

.toolbar h1 {
    font-size: 14px;
    font-weight: bold;
    margin-right: auto;
    color: white;
}

.btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
}

.btn:hover { background: #2a2b3d; border-color: var(--accent); }
.btn.accent { background: var(--accent); border-color: var(--accent); }
.btn.accent:hover { background: var(--accent-hover); }

.zoom-info {
    font-size: 12px;
    color: var(--text-dim);
    min-width: 45px;
    text-align: center;
}

.main {
    display: flex;
    flex: 1;
    overflow: hidden;
}

.editor-panel {
    width: 320px;
    min-width: 280px;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
}

.editor-header {
    padding: 8px 12px;
    font-size: 12px;
    font-weight: bold;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
}

#editor {
    flex: 1;
    padding: 12px;
    background: transparent;
    color: var(--text);
    border: none;
    outline: none;
    resize: none;
    font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.6;
    tab-size: 2;
}

#editor::placeholder { color: var(--text-dim); }

/* Canvas Panel */
.canvas-panel {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #f0f2f5;
    /* Subtle grid */
    background-image: radial-gradient(circle, #c8cdd6 1px, transparent 1px);
    background-size: 24px 24px;
}

/* The scrollable viewport */
#canvas-container {
    width: 100%;
    height: 100%;
    overflow: auto;
    position: relative;
}

/*
 * FIX: The zoom wrapper scales both the node canvas AND the SVG together.
 * This ensures lines always stay aligned with nodes regardless of zoom.
 */
#zoom-wrapper {
    position: absolute;
    top: 0;
    left: 0;
    transform-origin: 0 0;
    /* Size set by JS based on virtual canvas size */
}

/* Node canvas - absolute positioned nodes live here */
#canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 4000px;
    height: 3000px;
}

/* SVG lines - same size as canvas, sits on top */
#lines-svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 4000px;
    height: 3000px;
    pointer-events: none;
    z-index: 5;
    overflow: visible;
}

/* Entity nodes */
.entity {
    position: absolute;
    width: 220px;
    background: #ffffff;
    border: 2px solid var(--ecolor, #7c3aed);
    border-radius: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.10);
    z-index: 10;
    cursor: grab;
    user-select: none;
}

.entity.dragging {
    cursor: grabbing;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    z-index: 100;
}

.entity-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--ecolor, #7c3aed);
    background: color-mix(in srgb, var(--ecolor, #7c3aed) 8%, white);
    border-radius: 8px 8px 0 0;
}

.entity-icon {
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ecolor, #7c3aed);
    flex-shrink: 0;
}

.entity-name {
    font-weight: 700;
    font-size: 13px;
    color: var(--ecolor, #7c3aed);
}

.entity-fields {
    padding: 4px 0;
}

.field {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    font-size: 12px;
    font-family: "SF Mono", "Fira Code", "Menlo", monospace;
    position: relative;
    height: 28px;
}

.field.pk { font-weight: 500; }

.field-name { color: #1a202c; font-weight: 500; }
.field-type { color: #718096; margin-left: auto; font-size: 11px; }

.pk-badge {
    font-size: 9px;
    background: #fef3c7;
    color: #92400e;
    border: 1px solid #fbbf24;
    padding: 1px 4px;
    border-radius: 3px;
    font-weight: 700;
    margin-left: 2px;
    flex-shrink: 0;
}

[data-color="blue"]  { --ecolor: #3b82f6; }
[data-color="green"] { --ecolor: #22c55e; }
[data-color="red"]   { --ecolor: #ef4444; }
[data-color="grey"],
[data-color="gray"]  { --ecolor: #6b7280; }
[data-color="purple"]{ --ecolor: #7c3aed; }
[data-color="orange"]{ --ecolor: #f97316; }
</style>
</head>
<body>

<div class="toolbar">
    <h1>BUNON</h1>
    <button class="btn" onclick="zoomIn()">
        <svg width="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        Zoom In
    </button>
    <button class="btn" onclick="zoomOut()">
        <svg width="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        Zoom Out
    </button>
    <button class="btn" onclick="zoomReset()">
        <svg width="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        Reset
    </button>
    <span class="zoom-info" id="zoom-level">100%</span>
    <span style="flex:1"></span>
    <button class="btn" onclick="exportText()">
        <svg width="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
        Export Text
    </button>
    <button class="btn accent" onclick="exportPNG()">
        <svg width="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export PNG
    </button>
</div>

<div class="main">
    <div class="editor-panel">
        <div class="editor-header">
            <svg width="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            Write ERD Code
        </div>
        <textarea id="editor" placeholder="Write ERD Code here..." spellcheck="false"></textarea>
    </div>
    <div class="canvas-panel">
        <div id="canvas-container">
            <!-- FIX: zoom-wrapper wraps BOTH canvas and SVG so they scale together -->
            <div id="zoom-wrapper">
                <div id="canvas"></div>
                <svg id="lines-svg"></svg>
            </div>
        </div>
    </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
var entityElements = {};   // name → { el, entity, x, y, width }
var zoomScale = 1;
var isDragging = false;
var dragEntity = null;
var dragOffsetX = 0;
var dragOffsetY = 0;

// Layout constants
var FIELD_HEIGHT  = 28;   // px per field row
var HEADER_HEIGHT = 42;   // entity header height
var PADDING_BOT   = 8;    // bottom padding inside entity
var ENTITY_WIDTH  = 220;
var GAP_X         = 80;   // horizontal gap between entities  ← was 420, WAY too big
var GAP_Y         = 60;   // vertical gap between rows
var START_X       = 60;
var START_Y       = 60;
var CANVAS_W      = 4000;
var CANVAS_H      = 3000;

// ─── Icons ───────────────────────────────────────────────────────────────────
var ICONS = {
    user: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
    users: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
    home: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
    folder: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>',
    "message-circle": '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>',
    mail: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>'
};

// ─── Parser ──────────────────────────────────────────────────────────────────
function parseERD(text) {
    var entities = {};
    var relationships = [];
    var lines = text.split('\n');
    var currentEntity = null;
    var inBraces = false;

    for (var i = 0; i < lines.length; i++) {
        var trimmed = lines[i].trim();
        if (!trimmed) continue;

        if (inBraces) {
            if (trimmed === '}') { inBraces = false; currentEntity = null; continue; }
            if (currentEntity) {
                var fm = trimmed.match(/^(\w+)\s+(\w+)(.*)?$/);
                if (fm) {
                    var isPK = fm[3] && fm[3].indexOf('pk') !== -1;
                    entities[currentEntity].fields.push({ name: fm[1], type: fm[2], pk: isPK });
                }
            }
            continue;
        }

        // Relationship line: table.field (symbol) table.field
        var rm = trimmed.match(/^(\w+)\.(\w+)\s*(<>|>|<)\s*(\w+)\.(\w+)$/);
        if (rm) {
            relationships.push({
                fromTable: rm[1], fromField: rm[2],
                symbol: rm[3],
                toTable: rm[4], toField: rm[5]
            });
            continue;
        }

        // Entity definition: Name [icon: x, color: y] {
        var em = trimmed.match(/^(\w+)\s*(?:\[([^\]]*)\])?\s*\{$/);
        if (em) {
            var ename = em[1];
            currentEntity = ename;
            var meta = { color: 'grey', icon: 'home' };
            if (em[2]) {
                em[2].split(',').forEach(function(p) {
                    var kv = p.split(':');
                    if (kv.length === 2) meta[kv[0].trim()] = kv[1].trim();
                });
            }
            entities[ename] = { name: ename, fields: [], meta: meta };
            inBraces = true;
        }
    }
    return { entities: entities, relationships: relationships };
}

// ─── Layout ──────────────────────────────────────────────────────────────────
function getEntityHeight(entity) {
    return HEADER_HEIGHT + entity.fields.length * FIELD_HEIGHT + PADDING_BOT;
}

function layoutEntities(entities, relationships) {
    var keys = Object.keys(entities);
    var positions = {};

    // Build adjacency for grouping connected components
    var adj = {};
    keys.forEach(function(k) { adj[k] = {}; });
    relationships.forEach(function(r) {
        if (adj[r.fromTable]) adj[r.fromTable][r.toTable] = true;
        if (adj[r.toTable])   adj[r.toTable][r.fromTable] = true;
    });

    var placed = {};
    var groups = [];

    function bfs(start) {
        var queue = [start], group = [];
        placed[start] = true;
        while (queue.length) {
            var cur = queue.shift();
            group.push(cur);
            Object.keys(adj[cur] || {}).forEach(function(n) {
                if (!placed[n]) { placed[n] = true; queue.push(n); }
            });
        }
        return group;
    }

    keys.forEach(function(k) { if (!placed[k]) groups.push(bfs(k)); });

    var curY = START_Y;
    groups.forEach(function(group) {
        var curX = START_X;
        var rowH = 0;
        group.forEach(function(name) {
            var h = getEntityHeight(entities[name]);
            positions[name] = { x: curX, y: curY, width: ENTITY_WIDTH, height: h };
            curX += ENTITY_WIDTH + GAP_X;
            if (h > rowH) rowH = h;
        });
        curY += rowH + GAP_Y;
    });

    return positions;
}

// ─── Rendering ───────────────────────────────────────────────────────────────
function renderERD(text) {
    var parsed = parseERD(text);
    var entities = parsed.entities;
    var relationships = parsed.relationships;

    var canvas = document.getElementById('canvas');
    var svg    = document.getElementById('lines-svg');
    entityElements = {};
    canvas.innerHTML = '';
    svg.innerHTML = '';

    var positions = layoutEntities(entities, relationships);

    Object.keys(entities).forEach(function(name) {
        var entity = entities[name];
        var pos = positions[name];
        if (!pos) return;

        var color   = entity.meta.color || 'grey';
        var iconKey = entity.meta.icon  || 'home';
        var iconSvg = ICONS[iconKey] || ICONS['home'];

        var div = document.createElement('div');
        div.className = 'entity';
        div.setAttribute('data-color', color);
        div.style.left = pos.x + 'px';
        div.style.top  = pos.y + 'px';
        div.id = 'entity-' + name;

        var fieldsHTML = '';
        entity.fields.forEach(function(f) {
            fieldsHTML += '<div class="field' + (f.pk ? ' pk' : '') + '" data-fieldname="' + f.name + '">';
            fieldsHTML += '<span class="field-name">' + f.name + '</span>';
            if (f.pk) fieldsHTML += '<span class="pk-badge">PK</span>';
            fieldsHTML += '<span class="field-type">' + f.type + '</span>';
            fieldsHTML += '</div>';
        });

        div.innerHTML =
            '<div class="entity-header">' +
                '<span class="entity-icon">' + iconSvg + '</span>' +
                '<span class="entity-name">' + name + '</span>' +
            '</div>' +
            '<div class="entity-fields">' + fieldsHTML + '</div>';

        div.addEventListener('mousedown', function(e) { startDrag(e, name); });
        canvas.appendChild(div);

        entityElements[name] = {
            el: div,
            entity: entity,
            x: pos.x,
            y: pos.y,
            width: pos.width,
            height: pos.height
        };
    });

    drawRelationships(relationships);
}

// ─── Get the canvas-space Y center of a specific field in an entity ──────────
function getFieldCenterY(entityName, fieldName) {
    var info = entityElements[entityName];
    if (!info) return null;
    var fields = info.entity.fields;
    for (var i = 0; i < fields.length; i++) {
        if (fields[i].name === fieldName) {
            // HEADER_HEIGHT + (index * FIELD_HEIGHT) + half field = center of that row
            return info.y + HEADER_HEIGHT + (i * FIELD_HEIGHT) + (FIELD_HEIGHT / 2);
        }
    }
    // Fallback: entity vertical center
    return info.y + info.height / 2;
}

// ─── Draw relationship lines ──────────────────────────────────────────────────
function drawRelationships(relationships) {
    var svg   = document.getElementById('lines-svg');
    var svgNS = 'http://www.w3.org/2000/svg';
    svg.innerHTML = '';

    // ── Markers ──────────────────────────────────────────────────────────────
    var defs = document.createElementNS(svgNS, 'defs');

    function makeMarker(id, content) {
        var m = document.createElementNS(svgNS, 'marker');
        m.setAttribute('id', id);
        m.setAttribute('markerWidth',  '12');
        m.setAttribute('markerHeight', '10');
        m.setAttribute('refX', '6');
        m.setAttribute('refY', '5');
        m.setAttribute('orient', 'auto-start-reverse');
        m.innerHTML = content;
        defs.appendChild(m);
    }

    // Crow's foot (many) — two vertical lines at the tip
    makeMarker('marker-many',
        '<line x1="3" y1="1" x2="3" y2="9" stroke="#94a3b8" stroke-width="1.5" fill="none"/>' +
        '<line x1="6" y1="1" x2="6" y2="9" stroke="#94a3b8" stroke-width="1.5" fill="none"/>');

    // One — single vertical bar
    makeMarker('marker-one',
        '<line x1="5" y1="1" x2="5" y2="9" stroke="#94a3b8" stroke-width="1.5" fill="none"/>');

    // Dot — circle for optional
    makeMarker('marker-dot',
        '<circle cx="5" cy="5" r="3" fill="#94a3b8"/>');

    svg.appendChild(defs);

    // ── Draw each relationship ───────────────────────────────────────────────
    relationships.forEach(function(rel) {
        var fromInfo = entityElements[rel.fromTable];
        var toInfo   = entityElements[rel.toTable];
        if (!fromInfo || !toInfo) return;

        // Y centers of the connected fields
        var y1 = getFieldCenterY(rel.fromTable, rel.fromField);
        var y2 = getFieldCenterY(rel.toTable,   rel.toField);
        if (y1 === null || y2 === null) return;

        // Decide which sides to exit from based on horizontal position
        // From-entity center X vs To-entity center X
        var fromCX = fromInfo.x + fromInfo.width / 2;
        var toCX   = toInfo.x   + toInfo.width  / 2;

        var x1, x2;
        if (fromCX <= toCX) {
            // from is to the LEFT of to → exit right, enter left
            x1 = fromInfo.x + fromInfo.width;
            x2 = toInfo.x;
        } else {
            // from is to the RIGHT of to → exit left, enter right
            x1 = fromInfo.x;
            x2 = toInfo.x + toInfo.width;
        }

        // Smooth cubic bezier — control points pulled horizontally
        var dx = Math.abs(x2 - x1);
        var cpOffset = Math.min(Math.max(dx * 0.5, 40), 180);

        var cx1, cx2;
        if (fromCX <= toCX) {
            cx1 = x1 + cpOffset;
            cx2 = x2 - cpOffset;
        } else {
            cx1 = x1 - cpOffset;
            cx2 = x2 + cpOffset;
        }

        var d = 'M ' + x1 + ' ' + y1 +
                ' C ' + cx1 + ' ' + y1 +
                ', '  + cx2 + ' ' + y2 +
                ', '  + x2  + ' ' + y2;

        var path = document.createElementNS(svgNS, 'path');
        path.setAttribute('d', d);
        path.setAttribute('stroke', '#94a3b8');
        path.setAttribute('stroke-width', '1.5');
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke-linecap', 'round');

        // Assign markers based on relationship symbol
        // > means many-to-one: start=many, end=one
        // < means one-to-many: start=one, end=many
        // <> means many-to-many
        if (rel.symbol === '<>') {
            path.setAttribute('marker-start', 'url(#marker-many)');
            path.setAttribute('marker-end',   'url(#marker-many)');
        } else if (rel.symbol === '>') {
            // fromTable.field > toTable.field  →  many-to-one
            path.setAttribute('marker-start', 'url(#marker-many)');
            path.setAttribute('marker-end',   'url(#marker-one)');
        } else if (rel.symbol === '<') {
            // fromTable.field < toTable.field  →  one-to-many
            path.setAttribute('marker-start', 'url(#marker-one)');
            path.setAttribute('marker-end',   'url(#marker-many)');
        }

        svg.appendChild(path);
    });
}

// ─── Drag ─────────────────────────────────────────────────────────────────────
function startDrag(e, name) {
    if (e.button !== 0) return;
    isDragging  = true;
    dragEntity  = name;

    var info = entityElements[name];
    // offset in canvas-space (divide client delta by zoom)
    var canvasRect = document.getElementById('zoom-wrapper').getBoundingClientRect();
    dragOffsetX = (e.clientX - canvasRect.left) / zoomScale - info.x;
    dragOffsetY = (e.clientY - canvasRect.top)  / zoomScale - info.y;

    info.el.classList.add('dragging');
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup',   stopDrag);
    e.preventDefault();
}

function onDrag(e) {
    if (!isDragging || !dragEntity) return;
    var info = entityElements[dragEntity];
    var canvasRect = document.getElementById('zoom-wrapper').getBoundingClientRect();

    var newX = (e.clientX - canvasRect.left) / zoomScale - dragOffsetX;
    var newY = (e.clientY - canvasRect.top)  / zoomScale - dragOffsetY;

    // Clamp inside canvas
    newX = Math.max(0, Math.min(CANVAS_W - info.width,  newX));
    newY = Math.max(0, Math.min(CANVAS_H - info.height, newY));

    info.x = newX;
    info.y = newY;
    info.el.style.left = newX + 'px';
    info.el.style.top  = newY + 'px';

    // Redraw lines live
    var parsed = parseERD(document.getElementById('editor').value);
    drawRelationships(parsed.relationships);
}

function stopDrag() {
    isDragging = false;
    if (dragEntity && entityElements[dragEntity]) {
        entityElements[dragEntity].el.classList.remove('dragging');
    }
    dragEntity = null;
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('mouseup',   stopDrag);
}

// ─── Zoom ─────────────────────────────────────────────────────────────────────
function setZoom(scale) {
    zoomScale = Math.max(0.2, Math.min(3, scale));

    // Scale the zoom-wrapper (contains both #canvas and #lines-svg)
    var wrapper = document.getElementById('zoom-wrapper');
    wrapper.style.transform = 'scale(' + zoomScale + ')';
    // Keep the scrollable area sized correctly so scrollbars appear
    wrapper.style.width  = CANVAS_W + 'px';
    wrapper.style.height = CANVAS_H + 'px';

    document.getElementById('zoom-level').textContent = Math.round(zoomScale * 100) + '%';
}

function zoomIn()    { setZoom(zoomScale + 0.1); }
function zoomOut()   { setZoom(zoomScale - 0.1); }
function zoomReset() { setZoom(1); }

document.getElementById('canvas-container').addEventListener('wheel', function(e) {
    if (e.ctrlKey || e.metaKey) {
        e.preventDefault();
        setZoom(zoomScale + (e.deltaY > 0 ? -0.08 : 0.08));
    }
}, { passive: false });

// ─── Export ───────────────────────────────────────────────────────────────────
function exportText() {
    var text = document.getElementById('editor').value;
    var blob = new Blob([text], { type: 'text/plain' });
    var url  = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'erd.txt'; a.click();
    URL.revokeObjectURL(url);
}

function exportPNG() {
    alert('PNG export: use browser Print → Save as PDF or take a screenshot. Full canvas export coming soon!');
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
var defaultText =
`users [icon: user, color: blue] {

  team_role string
  teams string
}

teams [icon: users, color: blue] {
  id string pk
  name string
}

workspaces [icon: home] {
  id string
  createdAt timestamp
  folderId string
  teamId string
}

folders [icon: folder] {
  id string
  name string
}

chat [icon: message-circle, color: green] {
  duration number
  startedAt timestamp
  endedAt timestamp
  workspaceId string
}

invite [icon: mail, color: green] {
  inviteId string

  workspaceId string

}

users.teams <> teams.id
workspaces.folderId > folders.id
workspaces.teamId > teams.id
chat.workspaceId > workspaces.id
invite.workspaceId > workspaces.id
invite.inviterId > users.id`;

var editor = document.getElementById('editor');
editor.value = defaultText;

// Initial zoom wrapper sizing
setZoom(1);

// Debounced re-render on edit
var debounceTimer;
editor.addEventListener('input', function() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function() { renderERD(editor.value); }, 280);
});

// Initial render
renderERD(defaultText);
</script>
