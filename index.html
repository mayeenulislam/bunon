<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUNON</title>
<link rel="icon" type="image/x-icon" href="logo.png">
<style>
@font-face {
    font-family: 'Kohinoor Bangla';
    src: local('Kohinoor Bangla Regular'), local('KohinoorBangla-Regular'),
         url('fonts/KohinoorBangla-Regular.eot');
    src: local('Kohinoor Bangla Regular'), local('KohinoorBangla-Regular'),
         url('fonts/KohinoorBangla-Regular.eot?#iefix') format('embedded-opentype'),
         url('fonts/KohinoorBangla-Regular.woff2') format('woff2'),
         url('fonts/KohinoorBangla-Regular.woff') format('woff'),
         url('fonts/KohinoorBangla-Regular.ttf') format('truetype');
    font-weight: normal; font-style: normal; font-display: swap;
}
@font-face {
    font-family: 'Kohinoor Bangla';
    src: local('Kohinoor Bangla Bold'), local('KohinoorBangla-Bold'),
         url('fonts/KohinoorBangla-Bold.eot');
    src: local('Kohinoor Bangla Bold'), local('KohinoorBangla-Bold'),
         url('fonts/KohinoorBangla-Bold.eot?#iefix') format('embedded-opentype'),
         url('fonts/KohinoorBangla-Bold.woff2') format('woff2'),
         url('fonts/KohinoorBangla-Bold.woff') format('woff'),
         url('fonts/KohinoorBangla-Bold.ttf') format('truetype');
    font-weight: bold; font-style: normal; font-display: swap;
}

:root {
    --bg: #0f1117;
    --surface: #1a1b26;
    --border: #2a2b3d;
    --text: #e0e0e0;
    --text-dim: #8888a0;
    --accent: #7c3aed;
    --accent-hover: #6d28d9;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Kohinoor Bangla', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

.toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
}
.toolbar h1 { font-size: 14px; font-weight: bold; margin-right: auto; color: white; }

.btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
}
.btn:hover { background: #2a2b3d; border-color: var(--accent); }
.btn.accent { background: var(--accent); border-color: var(--accent); }
.btn.accent:hover { background: var(--accent-hover); }

.zoom-info {
    display: inline-block;
    font-size: 12px;
    color: var(--text-dim);
    min-width: 45px;
    text-align: center;
    vertical-align: middle;
}

.main { display: flex; flex: 1; overflow: hidden; }

.editor-panel {
    width: 320px;
    min-width: 280px;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
}
.editor-header {
    padding: 8px 12px;
    font-size: 12px;
    font-weight: bold;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
}
#editor {
    flex: 1;
    padding: 12px;
    background: transparent;
    color: var(--text);
    border: none;
    outline: none;
    resize: none;
    font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.6;
    tab-size: 2;
}
#editor::placeholder { color: var(--text-dim); }

/* ═══════════════════════════════════════
   CANVAS PANEL — infinite canvas approach
   overflow:hidden + JS-managed pan/zoom
   NO scrollbars, NO overflow:auto
   ═══════════════════════════════════════ */
.canvas-panel {
    flex: 1;
    position: relative;
    overflow: hidden;          /* clip content, NOT scroll */
    background: #f0f2f5;
    background-image: radial-gradient(circle, #c8cdd6 1px, transparent 1px);
    background-size: 24px 24px;
    cursor: default;
}

/*
 * zoom-wrapper sits directly in canvas-panel (overflow:hidden).
 * Its transform is: translate(panX px, panY px) scale(zoom)
 * controlled 100% by JS — no browser scroll involved.
 *
 * WHY THIS FIXES THE BUG:
 *   Old approach used overflow:auto + CSS scale(). CSS scale() only
 *   affects rendering, not layout — so the 4000×3000 element still
 *   occupied 4000×3000 of scroll space even at 10% zoom, making
 *   scrollbars useless and edges unreachable.
 *
 *   New approach: overflow:hidden panel + translate(panX,panY) means
 *   we move content by changing panX/panY directly. Pan works at ANY
 *   zoom level because it's just arithmetic, not scroll position.
 */
#zoom-wrapper {
    position: absolute;
    top: 0;
    left: 0;
    transform-origin: 0 0;
    /* transform set by applyTransform() */
    will-change: transform;
}

#canvas {
    position: absolute;
    top: 0; left: 0;
    width: 4000px; height: 3000px;
    pointer-events: none; /* let mousedown on empty space fall through to panel */
}

/* entities re-enable pointer events individually */
.entity { pointer-events: all; }

#lines-svg {
    position: absolute;
    top: 0; left: 0;
    width: 4000px; height: 3000px;
    pointer-events: none;
    z-index: 5;
    overflow: visible;
}

/* Entity nodes */
.entity {
    position: absolute;
    width: 220px;
    background: #ffffff;
    border: 2px solid var(--ecolor, #7c3aed);
    border-radius: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.10);
    z-index: 10;
    cursor: grab;
    user-select: none;
}
.entity.dragging {
    cursor: grabbing;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    z-index: 100;
}
.entity-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--ecolor, #7c3aed);
    background: var(--eheader-bg, #f5f3ff);
    border-radius: 8px 8px 0 0;
}
.entity-icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; color: var(--ecolor, #7c3aed); flex-shrink: 0; }
.entity-name { font-weight: 700; font-size: 13px; color: var(--ecolor, #7c3aed); }
.entity-fields { padding: 4px 0; }
.field {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    font-size: 12px;
    font-family: "SF Mono", "Fira Code", "Menlo", monospace;
    position: relative;
    height: 28px;
}
.field.pk { font-weight: 500; }
.field-name { color: #1a202c; font-weight: 500; }
.field-type { color: #718096; margin-left: auto; font-size: 11px; }
.pk-badge {
    font-size: 9px;
    background: #fef3c7;
    color: #92400e;
    border: 1px solid #fbbf24;
    padding: 1px 4px;
    border-radius: 3px;
    font-weight: 700;
    margin-left: 2px;
    flex-shrink: 0;
}

[data-color="blue"]   { --ecolor: #3b82f6; --eheader-bg: #eff6ff; }
[data-color="green"]  { --ecolor: #22c55e; --eheader-bg: #f0fdf4; }
[data-color="red"]    { --ecolor: #ef4444; --eheader-bg: #fef2f2; }
[data-color="grey"],
[data-color="gray"]   { --ecolor: #6b7280; --eheader-bg: #f9fafb; }
[data-color="purple"] { --ecolor: #7c3aed; --eheader-bg: #f5f3ff; }
[data-color="orange"] { --ecolor: #f97316; --eheader-bg: #fff7ed; }

/* HUD */
.hud {
    position: absolute;
    bottom: 20px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
    z-index: 100;
}
.hint-bar {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--text-dim);
    background: rgba(26,27,38,0.75);
    padding: 4px 12px;
    border-radius: 20px;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
}
</style>
</head>
<body>

<div class="toolbar">
    <img src="logo-white.png" alt="Logo of BUNON" width="20" height="20" onerror="this.style.display='none'">
    <h1>BUNON</h1>
    <span style="flex:1"></span>
    <button class="btn accent" onclick="exportPNG()">
        <svg width="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export as PNG
    </button>
</div>

<div class="main">
    <div class="editor-panel">
        <div class="editor-header">
            <svg width="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            Entity Relationship
        </div>
        <textarea id="editor" placeholder="Write ERD Code here..." spellcheck="false"></textarea>
        <div style="background-color:#333;border-top:1px solid #666;padding:5px;text-align:right;">
            <button class="btn" onclick="exportText()">
                <svg width="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                Export as Text
            </button>
        </div>
    </div>

    <div class="canvas-panel" id="canvas-panel">

        <!-- THE INFINITE CANVAS WRAPPER -->
        <div id="zoom-wrapper">
            <div id="canvas"></div>
            <svg id="lines-svg"></svg>
        </div>

        <!-- HUD bottom-right -->
        <div class="hud">
            <span class="zoom-info" id="zoom-level">100%</span>
            <button class="btn" onclick="zoomStep(0.15)" title="Zoom In">
                <svg width="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
            </button>
            <button class="btn" onclick="zoomStep(-0.15)" title="Zoom Out">
                <svg width="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
            </button>
            <button class="btn" onclick="fitView()" title="Fit all">
                <svg width="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                Fit
            </button>
        </div>

        <div class="hint-bar">Scroll to pan &nbsp;·&nbsp; Ctrl/⌘+Scroll to zoom &nbsp;·&nbsp; Drag empty space to pan</div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// VIEWPORT STATE
// Single source of truth: panX, panY, zoom
// Transform applied as: translate(panX, panY) scale(zoom)
// Canvas point (cx,cy) → screen point (cx*zoom + panX, cy*zoom + panY)
// Screen point (sx,sy) → canvas point ((sx-panX)/zoom, (sy-panY)/zoom)
// ═══════════════════════════════════════════════════════════════════════
var panX = 0, panY = 0, zoom = 1;

// entity drag state
var isDragging = false, dragEntity = null;
var dragStartCX = 0, dragStartCY = 0;   // canvas-space mouse pos at drag start
var dragStartEX = 0, dragStartEY = 0;   // entity canvas pos at drag start

// canvas pan state (drag empty space / middle-mouse)
var isPanning = false;
var panMouseStartX = 0, panMouseStartY = 0;
var panStartX = 0, panStartY = 0;

var entityElements = {};

// Layout constants
var FIELD_HEIGHT  = 28;
var HEADER_HEIGHT = 42;
var PADDING_BOT   = 8;
var ENTITY_WIDTH  = 220;
var GAP_X = 80, GAP_Y = 60;
var START_X = 60, START_Y = 60;
var CANVAS_W = 4000, CANVAS_H = 3000;

// ═══════════════════════════════════════════════════════════════════════
// TRANSFORM HELPERS
// ═══════════════════════════════════════════════════════════════════════
function applyTransform() {
    document.getElementById('zoom-wrapper').style.transform =
        'translate(' + panX + 'px,' + panY + 'px) scale(' + zoom + ')';
    document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
}

// screen coords (relative to panel top-left) → canvas coords
function screenToCanvas(sx, sy) {
    var r = document.getElementById('canvas-panel').getBoundingClientRect();
    return {
        x: (sx - r.left - panX) / zoom,
        y: (sy - r.top  - panY) / zoom
    };
}

// ═══════════════════════════════════════════════════════════════════════
// ICONS
// ═══════════════════════════════════════════════════════════════════════
var ICONS = {
    user: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
    users: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
    home: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
    folder: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>',
    "message-circle": '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>',
    mail: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>'
};

// ═══════════════════════════════════════════════════════════════════════
// PARSER
// ═══════════════════════════════════════════════════════════════════════
function parseERD(text) {
    var entities = {}, relationships = [];
    var lines = text.split('\n');
    var currentEntity = null, inBraces = false;

    for (var i = 0; i < lines.length; i++) {
        var trimmed = lines[i].trim();
        if (!trimmed) continue;

        if (inBraces) {
            if (trimmed === '}') { inBraces = false; currentEntity = null; continue; }
            if (currentEntity) {
                var fm = trimmed.match(/^(\w+)\s+(\w+)(.*)?$/);
                if (fm) {
                    entities[currentEntity].fields.push({
                        name: fm[1], type: fm[2],
                        pk: !!(fm[3] && fm[3].indexOf('pk') !== -1)
                    });
                }
            }
            continue;
        }

        var rm = trimmed.match(/^(\w+)\.(\w+)\s*(<>|>|<)\s*(\w+)\.(\w+)$/);
        if (rm) {
            relationships.push({ fromTable: rm[1], fromField: rm[2], symbol: rm[3], toTable: rm[4], toField: rm[5] });
            continue;
        }

        var em = trimmed.match(/^(\w+)\s*(?:\[([^\]]*)\])?\s*\{$/);
        if (em) {
            var ename = em[1];
            currentEntity = ename;
            var meta = { color: 'grey', icon: 'home' };
            if (em[2]) {
                em[2].split(',').forEach(function(p) {
                    var kv = p.split(':');
                    if (kv.length === 2) meta[kv[0].trim()] = kv[1].trim();
                });
            }
            entities[ename] = { name: ename, fields: [], meta: meta };
            inBraces = true;
        }
    }
    return { entities: entities, relationships: relationships };
}

// ═══════════════════════════════════════════════════════════════════════
// LAYOUT
// ═══════════════════════════════════════════════════════════════════════
function getEntityHeight(entity) {
    return HEADER_HEIGHT + entity.fields.length * FIELD_HEIGHT + PADDING_BOT;
}

function layoutEntities(entities, relationships) {
    var keys = Object.keys(entities);
    var positions = {};
    if (keys.length === 0) return positions;

    var adj = {};
    keys.forEach(function(k) { adj[k] = {}; });
    relationships.forEach(function(r) {
        if (adj[r.fromTable]) adj[r.fromTable][r.toTable] = true;
        if (adj[r.toTable])   adj[r.toTable][r.fromTable] = true;
    });

    var placed = {}, groups = [];
    function bfs(start) {
        var queue = [start], group = [];
        placed[start] = true;
        while (queue.length) {
            var cur = queue.shift(); group.push(cur);
            Object.keys(adj[cur] || {}).forEach(function(n) {
                if (!placed[n]) { placed[n] = true; queue.push(n); }
            });
        }
        return group;
    }
    keys.forEach(function(k) { if (!placed[k]) groups.push(bfs(k)); });

    function bestCols(n) {
        if (n <= 1) return 1;
        if (n <= 2) return 2;
        if (n <= 4) return 2;
        if (n <= 6) return 3;
        return 4;
    }

    var curY = START_Y;
    groups.forEach(function(group) {
        var cols = bestCols(group.length);
        var colPositions = [];
        for (var c = 0; c < cols; c++) colPositions.push(START_X + c * (ENTITY_WIDTH + GAP_X));
        var rowStartY = curY, rowMaxH = 0;
        group.forEach(function(name, idx) {
            var col = idx % cols;
            if (col === 0 && idx > 0) { rowStartY += rowMaxH + GAP_Y; rowMaxH = 0; }
            var h = getEntityHeight(entities[name]);
            positions[name] = { x: colPositions[col], y: rowStartY, width: ENTITY_WIDTH, height: h };
            if (h > rowMaxH) rowMaxH = h;
        });
        curY = rowStartY + rowMaxH + GAP_Y * 2;
    });
    return positions;
}

// ═══════════════════════════════════════════════════════════════════════
// FIT VIEW — center + scale content to fill panel
// ═══════════════════════════════════════════════════════════════════════
function fitView() {
    var keys = Object.keys(entityElements);
    if (keys.length === 0) return;

    var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    keys.forEach(function(k) {
        var e = entityElements[k];
        if (e.x            < minX) minX = e.x;
        if (e.y            < minY) minY = e.y;
        if (e.x + e.width  > maxX) maxX = e.x + e.width;
        if (e.y + e.height > maxY) maxY = e.y + e.height;
    });

    var PAD = 60;
    var contentW = maxX - minX + PAD * 2;
    var contentH = maxY - minY + PAD * 2;

    var panel = document.getElementById('canvas-panel');
    var W = panel.clientWidth, H = panel.clientHeight;

    zoom = Math.min(W / contentW, H / contentH, 1);
    zoom = Math.max(zoom, 0.1);

    // center the content bounding box in the panel
    panX = (W - contentW * zoom) / 2 - (minX - PAD) * zoom;
    panY = (H - contentH * zoom) / 2 - (minY - PAD) * zoom;

    applyTransform();
}

// ═══════════════════════════════════════════════════════════════════════
// RENDER ERD
// ═══════════════════════════════════════════════════════════════════════
function renderERD(text) {
    var parsed = parseERD(text);
    var entities = parsed.entities, relationships = parsed.relationships;

    var canvasEl = document.getElementById('canvas');
    var svg      = document.getElementById('lines-svg');
    entityElements = {};
    canvasEl.innerHTML = '';
    svg.innerHTML = '';

    var positions = layoutEntities(entities, relationships);

    Object.keys(entities).forEach(function(name) {
        var entity = entities[name];
        var pos    = positions[name];
        if (!pos) return;

        var color   = entity.meta.color || 'grey';
        var iconKey = entity.meta.icon  || 'home';
        var iconSvg = ICONS[iconKey] || ICONS['home'];

        var div = document.createElement('div');
        div.className = 'entity';
        div.setAttribute('data-color', color);
        div.style.left = pos.x + 'px';
        div.style.top  = pos.y + 'px';
        div.id = 'entity-' + name;

        var fieldsHTML = '';
        entity.fields.forEach(function(f) {
            fieldsHTML +=
                '<div class="field' + (f.pk ? ' pk' : '') + '" data-fieldname="' + f.name + '">' +
                    '<span class="field-name">' + f.name + '</span>' +
                    (f.pk ? '<span class="pk-badge">PK</span>' : '') +
                    '<span class="field-type">' + f.type + '</span>' +
                '</div>';
        });

        div.innerHTML =
            '<div class="entity-header">' +
                '<span class="entity-icon">' + iconSvg + '</span>' +
                '<span class="entity-name">' + name + '</span>' +
            '</div>' +
            '<div class="entity-fields">' + fieldsHTML + '</div>';

        // entity drag starts here, stopPropagation so canvas-pan doesn't trigger
        div.addEventListener('mousedown', function(e) { startEntityDrag(e, name); });
        canvasEl.appendChild(div);

        entityElements[name] = {
            el: div, entity: entity,
            x: pos.x, y: pos.y,
            width: pos.width, height: pos.height
        };
    });

    drawRelationships(relationships);
    fitView();
}

// ═══════════════════════════════════════════════════════════════════════
// RELATIONSHIPS
// ═══════════════════════════════════════════════════════════════════════
function getFieldCenterY(entityName, fieldName) {
    var info = entityElements[entityName];
    if (!info) return null;
    var fields = info.entity.fields;
    for (var i = 0; i < fields.length; i++) {
        if (fields[i].name === fieldName)
            return info.y + HEADER_HEIGHT + i * FIELD_HEIGHT + FIELD_HEIGHT / 2;
    }
    return info.y + info.height / 2;
}

function drawRelationships(relationships) {
    var svg = document.getElementById('lines-svg');
    var NS  = 'http://www.w3.org/2000/svg';
    svg.innerHTML = '';

    var defs = document.createElementNS(NS, 'defs');
    function makeMarker(id, content) {
        var m = document.createElementNS(NS, 'marker');
        m.setAttribute('id', id); m.setAttribute('markerWidth', '12');
        m.setAttribute('markerHeight', '10'); m.setAttribute('refX', '6');
        m.setAttribute('refY', '5'); m.setAttribute('orient', 'auto-start-reverse');
        m.innerHTML = content; defs.appendChild(m);
    }
    makeMarker('mk-many',
        '<line x1="3" y1="1" x2="3" y2="9" stroke="#94a3b8" stroke-width="1.5"/>' +
        '<line x1="6" y1="1" x2="6" y2="9" stroke="#94a3b8" stroke-width="1.5"/>');
    makeMarker('mk-one',
        '<line x1="5" y1="1" x2="5" y2="9" stroke="#94a3b8" stroke-width="1.5"/>');
    svg.appendChild(defs);

    relationships.forEach(function(rel) {
        var fi = entityElements[rel.fromTable];
        var ti = entityElements[rel.toTable];
        if (!fi || !ti) return;

        var y1 = getFieldCenterY(rel.fromTable, rel.fromField);
        var y2 = getFieldCenterY(rel.toTable,   rel.toField);
        if (y1 === null || y2 === null) return;

        var fromCX = fi.x + fi.width / 2;
        var toCX   = ti.x + ti.width / 2;
        var x1 = fromCX <= toCX ? fi.x + fi.width : fi.x;
        var x2 = fromCX <= toCX ? ti.x             : ti.x + ti.width;
        var dx = Math.abs(x2 - x1);
        var cp = Math.min(Math.max(dx * 0.5, 40), 180);
        var cx1 = fromCX <= toCX ? x1 + cp : x1 - cp;
        var cx2 = fromCX <= toCX ? x2 - cp : x2 + cp;

        var path = document.createElementNS(NS, 'path');
        path.setAttribute('d', 'M'+x1+' '+y1+' C'+cx1+' '+y1+','+cx2+' '+y2+','+x2+' '+y2);
        path.setAttribute('stroke', '#94a3b8');
        path.setAttribute('stroke-width', '1.5');
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke-linecap', 'round');
        if (rel.symbol === '<>') {
            path.setAttribute('marker-start', 'url(#mk-many)');
            path.setAttribute('marker-end',   'url(#mk-many)');
        } else if (rel.symbol === '>') {
            path.setAttribute('marker-start', 'url(#mk-many)');
            path.setAttribute('marker-end',   'url(#mk-one)');
        } else if (rel.symbol === '<') {
            path.setAttribute('marker-start', 'url(#mk-one)');
            path.setAttribute('marker-end',   'url(#mk-many)');
        }
        svg.appendChild(path);
    });
}

// ═══════════════════════════════════════════════════════════════════════
// ENTITY DRAG
// ═══════════════════════════════════════════════════════════════════════
function startEntityDrag(e, name) {
    if (e.button !== 0) return;
    e.stopPropagation();  // prevent canvas-pan from starting
    isDragging = true;
    dragEntity = name;
    var info = entityElements[name];
    var cp = screenToCanvas(e.clientX, e.clientY);
    dragStartCX = cp.x; dragStartCY = cp.y;
    dragStartEX = info.x; dragStartEY = info.y;
    info.el.classList.add('dragging');
    document.addEventListener('mousemove', onEntityDrag);
    document.addEventListener('mouseup',   stopEntityDrag);
    e.preventDefault();
}

function onEntityDrag(e) {
    if (!isDragging || !dragEntity) return;
    var info = entityElements[dragEntity];
    var cp   = screenToCanvas(e.clientX, e.clientY);
    var nx   = dragStartEX + (cp.x - dragStartCX);
    var ny   = dragStartEY + (cp.y - dragStartCY);
    nx = Math.max(0, Math.min(CANVAS_W - info.width,  nx));
    ny = Math.max(0, Math.min(CANVAS_H - info.height, ny));
    info.x = nx; info.y = ny;
    info.el.style.left = nx + 'px';
    info.el.style.top  = ny + 'px';
    drawRelationships(parseERD(document.getElementById('editor').value).relationships);
}

function stopEntityDrag() {
    isDragging = false;
    if (dragEntity && entityElements[dragEntity])
        entityElements[dragEntity].el.classList.remove('dragging');
    dragEntity = null;
    document.removeEventListener('mousemove', onEntityDrag);
    document.removeEventListener('mouseup',   stopEntityDrag);
}

// ═══════════════════════════════════════════════════════════════════════
// CANVAS PAN — drag on empty canvas space or middle-mouse anywhere
// ═══════════════════════════════════════════════════════════════════════
var canvasPanel = document.getElementById('canvas-panel');

canvasPanel.addEventListener('mousedown', function(e) {
    // left-click on empty space OR middle-mouse anywhere → pan
    if (e.button === 0 || e.button === 1) {
        isPanning      = true;
        panMouseStartX = e.clientX;
        panMouseStartY = e.clientY;
        panStartX      = panX;
        panStartY      = panY;
        canvasPanel.style.cursor = 'grabbing';
        e.preventDefault();
    }
});

document.addEventListener('mousemove', function(e) {
    if (!isPanning) return;
    panX = panStartX + (e.clientX - panMouseStartX);
    panY = panStartY + (e.clientY - panMouseStartY);
    applyTransform();
});

document.addEventListener('mouseup', function(e) {
    if (isPanning && (e.button === 0 || e.button === 1)) {
        isPanning = false;
        canvasPanel.style.cursor = '';
    }
});

// ═══════════════════════════════════════════════════════════════════════
// WHEEL EVENTS
// scroll (no modifier) → PAN
// Ctrl / Cmd + scroll  → ZOOM toward cursor
// Shift + scroll       → horizontal pan
// ═══════════════════════════════════════════════════════════════════════
canvasPanel.addEventListener('wheel', function(e) {
    e.preventDefault();

    if (e.ctrlKey || e.metaKey) {
        // ── ZOOM toward cursor ────────────────────────────────────────
        var delta   = e.deltaY;
        var factor  = Math.abs(delta) > 50 ? 0.12 : 0.05; // mouse vs trackpad
        var dir     = delta > 0 ? -1 : 1;
        var newZoom = Math.max(0.08, Math.min(5, zoom + dir * factor));

        // canvas point under cursor must stay fixed
        var r  = canvasPanel.getBoundingClientRect();
        var sx = e.clientX - r.left;   // screen coords relative to panel
        var sy = e.clientY - r.top;
        // canvas point: (sx - panX) / zoom  stays constant
        var cx = (sx - panX) / zoom;
        var cy = (sy - panY) / zoom;

        zoom = newZoom;
        panX = sx - cx * zoom;
        panY = sy - cy * zoom;
        applyTransform();

    } else {
        // ── PAN ───────────────────────────────────────────────────────
        var dx = e.deltaX || 0;
        var dy = e.deltaY || 0;

        // Shift+vertical scroll → horizontal pan (standard Mac/browser convention)
        if (e.shiftKey && !e.deltaX) { dx = dy; dy = 0; }

        // Invert because we're moving content in same direction as finger/wheel
        panX -= dx;
        panY -= dy;
        applyTransform();
    }
}, { passive: false });

// ═══════════════════════════════════════════════════════════════════════
// ZOOM STEP BUTTONS (zoom around panel center)
// ═══════════════════════════════════════════════════════════════════════
function zoomStep(delta) {
    var panel   = document.getElementById('canvas-panel');
    var newZoom = Math.max(0.08, Math.min(5, zoom + delta));
    var cx      = panel.clientWidth  / 2;
    var cy      = panel.clientHeight / 2;
    // canvas point at center stays fixed
    var ccx = (cx - panX) / zoom;
    var ccy = (cy - panY) / zoom;
    zoom = newZoom;
    panX = cx - ccx * zoom;
    panY = cy - ccy * zoom;
    applyTransform();
}

// ═══════════════════════════════════════════════════════════════════════
// EXPORT TEXT
// ═══════════════════════════════════════════════════════════════════════
function exportText() {
    var text = document.getElementById('editor').value;
    var blob = new Blob([text], { type: 'text/plain' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href = url; a.download = 'erd.txt'; a.click();
    URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════════════════════════════════════
// EXPORT PNG — pure canvas 2D, no library
// ═══════════════════════════════════════════════════════════════════════
var COLOR_SCHEMES = {
    blue:   { border: '#3b82f6', header: '#eff6ff', text: '#3b82f6' },
    green:  { border: '#22c55e', header: '#f0fdf4', text: '#22c55e' },
    red:    { border: '#ef4444', header: '#fef2f2', text: '#ef4444' },
    grey:   { border: '#6b7280', header: '#f9fafb', text: '#6b7280' },
    gray:   { border: '#6b7280', header: '#f9fafb', text: '#6b7280' },
    purple: { border: '#7c3aed', header: '#f5f3ff', text: '#7c3aed' },
    orange: { border: '#f97316', header: '#fff7ed', text: '#f97316' }
};

function exportPNG() {
    var keys = Object.keys(entityElements);
    if (keys.length === 0) { alert('Nothing to export — add some tables first!'); return; }

    var PAD = 60;
    var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    keys.forEach(function(k) {
        var e = entityElements[k];
        if (e.x           < minX) minX = e.x;
        if (e.y           < minY) minY = e.y;
        if (e.x + e.width > maxX) maxX = e.x + e.width;
        if (e.y + e.height> maxY) maxY = e.y + e.height;
    });

    var W = maxX - minX + PAD * 2;
    var H = maxY - minY + PAD * 2;
    var ox = minX - PAD, oy = minY - PAD;

    var DPR = 2;
    var cv  = document.createElement('canvas');
    cv.width = W * DPR; cv.height = H * DPR;
    var ctx = cv.getContext('2d');
    ctx.scale(DPR, DPR);

    // background
    ctx.fillStyle = '#f0f2f5'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#c8cdd6';
    for (var gx = 0; gx <= W; gx += 24)
        for (var gy = 0; gy <= H; gy += 24) {
            ctx.beginPath(); ctx.arc(gx, gy, 1, 0, Math.PI * 2); ctx.fill();
        }

    // lines
    var parsed = parseERD(document.getElementById('editor').value);
    ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';

    parsed.relationships.forEach(function(rel) {
        var fi = entityElements[rel.fromTable];
        var ti = entityElements[rel.toTable];
        if (!fi || !ti) return;
        var y1 = getFieldCenterY(rel.fromTable, rel.fromField);
        var y2 = getFieldCenterY(rel.toTable,   rel.toField);
        if (y1 === null || y2 === null) return;
        var fromCX = fi.x + fi.width / 2, toCX = ti.x + ti.width / 2;
        var x1 = fromCX <= toCX ? fi.x + fi.width : fi.x;
        var x2 = fromCX <= toCX ? ti.x             : ti.x + ti.width;
        var dx = Math.abs(x2 - x1);
        var cp = Math.min(Math.max(dx * 0.5, 40), 180);
        var cx1 = fromCX <= toCX ? x1 + cp : x1 - cp;
        var cx2 = fromCX <= toCX ? x2 - cp : x2 + cp;

        ctx.beginPath();
        ctx.moveTo(x1-ox, y1-oy);
        ctx.bezierCurveTo(cx1-ox, y1-oy, cx2-ox, y2-oy, x2-ox, y2-oy);
        ctx.stroke();

        function chevron(px, py, pointRight) {
            var s=7, d=pointRight?-1:1;
            ctx.beginPath(); ctx.moveTo(px-ox+d*s,py-oy-s); ctx.lineTo(px-ox,py-oy); ctx.lineTo(px-ox+d*s,py-oy+s); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(px-ox+d*(s+5),py-oy-s); ctx.lineTo(px-ox+d*5,py-oy); ctx.lineTo(px-ox+d*(s+5),py-oy+s); ctx.stroke();
        }
        function tick(px, py, pointRight) {
            var d=pointRight?-1:1;
            ctx.beginPath(); ctx.moveTo(px-ox+d*6,py-oy-6); ctx.lineTo(px-ox+d*6,py-oy+6); ctx.stroke();
        }
        var ltr = fromCX <= toCX;
        if (rel.symbol==='>'||rel.symbol==='<>') chevron(x2,y2,ltr);
        if (rel.symbol==='<'||rel.symbol==='<>') chevron(x1,y1,!ltr);
        if (rel.symbol==='>') tick(x1,y1,!ltr);
        if (rel.symbol==='<') tick(x2,y2, ltr);
    });

    // entity boxes
    var R = 10;
    function rr(x,y,w,h) {
        ctx.beginPath(); ctx.moveTo(x+R,y); ctx.lineTo(x+w-R,y);
        ctx.arcTo(x+w,y,x+w,y+R,R); ctx.lineTo(x+w,y+h-R);
        ctx.arcTo(x+w,y+h,x+w-R,y+h,R); ctx.lineTo(x+R,y+h);
        ctx.arcTo(x,y+h,x,y+h-R,R); ctx.lineTo(x,y+R);
        ctx.arcTo(x,y,x+R,y,R); ctx.closePath();
    }

    keys.forEach(function(name) {
        var info   = entityElements[name];
        var scheme = COLOR_SCHEMES[info.entity.meta.color] || COLOR_SCHEMES['grey'];
        var x=info.x-ox, y=info.y-oy, w=info.width, h=info.height;

        ctx.save(); ctx.shadowColor='rgba(0,0,0,0.13)'; ctx.shadowBlur=12; ctx.shadowOffsetY=3;
        rr(x,y,w,h); ctx.fillStyle='#fff'; ctx.fill(); ctx.restore();

        rr(x,y,w,h); ctx.fillStyle='#fff'; ctx.fill();
        rr(x,y,w,h); ctx.strokeStyle=scheme.border; ctx.lineWidth=2; ctx.stroke();

        ctx.save(); ctx.beginPath();
        ctx.moveTo(x+R,y); ctx.lineTo(x+w-R,y); ctx.arcTo(x+w,y,x+w,y+R,R);
        ctx.lineTo(x+w,y+HEADER_HEIGHT); ctx.lineTo(x,y+HEADER_HEIGHT);
        ctx.lineTo(x,y+R); ctx.arcTo(x,y,x+R,y,R); ctx.closePath();
        ctx.fillStyle=scheme.header; ctx.fill(); ctx.restore();

        ctx.beginPath(); ctx.moveTo(x,y+HEADER_HEIGHT); ctx.lineTo(x+w,y+HEADER_HEIGHT);
        ctx.strokeStyle=scheme.border; ctx.lineWidth=1; ctx.stroke();

        ctx.textBaseline='middle'; ctx.textAlign='left';
        ctx.fillStyle=scheme.text; ctx.font='bold 13px -apple-system,Arial,sans-serif';
        ctx.fillText(name, x+36, y+HEADER_HEIGHT/2);

        var fy=y+HEADER_HEIGHT;
        info.entity.fields.forEach(function(f,idx) {
            var cy=fy+FIELD_HEIGHT/2;
            if(idx%2===1){ctx.fillStyle='rgba(0,0,0,0.015)';ctx.fillRect(x+1,fy,w-2,FIELD_HEIGHT);}
            ctx.fillStyle='#1a202c'; ctx.font=(f.pk?'600 ':'500 ')+'11.5px "SF Mono",Menlo,monospace';
            ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillText(f.name,x+14,cy);
            if(f.pk){
                var bx=x+14+ctx.measureText(f.name).width+5,bw=24,bh=13,by=cy-bh/2;
                ctx.fillStyle='#fef3c7'; ctx.strokeStyle='#fbbf24'; ctx.lineWidth=0.8;
                ctx.beginPath(); ctx.roundRect?ctx.roundRect(bx,by,bw,bh,3):ctx.rect(bx,by,bw,bh);
                ctx.fill(); ctx.stroke();
                ctx.fillStyle='#92400e'; ctx.font='bold 8px Arial,sans-serif';
                ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('PK',bx+bw/2,cy);
            }
            ctx.fillStyle='#718096'; ctx.font='11px "SF Mono",Menlo,monospace';
            ctx.textAlign='right'; ctx.textBaseline='middle'; ctx.fillText(f.type,x+w-14,cy);
            if(idx<info.entity.fields.length-1){
                ctx.beginPath(); ctx.moveTo(x+1,fy+FIELD_HEIGHT); ctx.lineTo(x+w-1,fy+FIELD_HEIGHT);
                ctx.strokeStyle='#f0f0f0'; ctx.lineWidth=0.5; ctx.stroke();
            }
            fy+=FIELD_HEIGHT;
        });
    });

    cv.toBlob(function(blob) {
        var url=URL.createObjectURL(blob);
        var a=document.createElement('a');
        a.href=url; a.download='erd-diagram.png';
        document.body.appendChild(a); a.click();
        document.body.removeChild(a);
        setTimeout(function(){URL.revokeObjectURL(url);},1000);
    }, 'image/png');
}

// ═══════════════════════════════════════════════════════════════════════

var defaultText =
`users [icon: user, color: blue] {
  id string pk
  displayName string
  team_role string
  teams string
}

teams [icon: users, color: blue] {
  id string pk
  name string
}

workspaces [icon: home] {
  id string
  createdAt timestamp
  folderId string
  teamId string
}

folders [icon: folder] {
  id string
  name string
}

chat [icon: message-circle, color: green] {
  duration number
  startedAt timestamp
  endedAt timestamp
  workspaceId string
}

invite [icon: mail, color: green] {
  inviteId string
  type string
  workspaceId string
  inviterId string
}

users.teams <> teams.id
workspaces.folderId > folders.id
workspaces.teamId > teams.id
chat.workspaceId > workspaces.id
invite.workspaceId > workspaces.id
invite.inviterId > users.id`;

var editor = document.getElementById('editor');
editor.value = defaultText;

var debounceTimer;
editor.addEventListener('input', function() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function() { renderERD(editor.value); }, 280);
});

requestAnimationFrame(function() { renderERD(defaultText); });
</script>
